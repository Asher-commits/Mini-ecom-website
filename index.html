<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E commerce</title>
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

 <!--Sign up, sign in section-->
 <div id="create">
    <form id="signUp">
    <h4>Create an account</h4>

    <label for="firstName">First Name:</label>
    <input type="text" name="firstName" id="firstName" required>

    <label for="lastName">Last name:</label>
    <input type="text" name="lastName" id="lastName" required>

    <label for="email">Email:</label>
    <input type="email" id="email" required>

    <label for="password">Password:</label>
    <input type="password" id="password" required>

    <button id="createAccountBtn">Create an account</button>
    <p>Already have an account? Click <a href="#" id="showLogin">here</a> to sign in</p>
</form>
 </div>

 <div id="login" style="display: none;">
<form id="signIn">
    <label for="signInEmail">Email:</label>
    <input type="email" id="signInEmail">

    <label for="signInPassowrd">Password:</label>
    <input type="password" id="signInPassword">
    <button id="logInBtn">Sign in</button>
</form>
 </div>
 


<div id="hide" style="display: none;">

<!-- BEFORE SEARCH SECTION -->
<div id="beforeSearch">

    <div id="top">

        <div class="top-stuffs">
            <h1>Hi, <span id="nombre"></span></h1>
            <input id="searchInput">
            <button id="searchBtn">Search</button>
        </div>

        <div class="top-buttons">
            <button id="favoritesBtn"><i class="fa-regular fa-heart"></i></button>
            <button id="cartBtn"><i class="fa-solid fa-cart-arrow-down"></i></button>
            <button id="signOutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>

    </div>

    <div id="middle">
        <h2>Trending products</h2>
        <ul id="displayTrendingProducts"></ul>
    </div>

</div>


<!-- AFTER SEARCH SECTION -->
<div id="afterSearch" style="display: none">
    <button id="backBtn"><i class="fa-solid fa-angle-left"></i></button>
    <p>Your search results...</p>
    <ul id="displaySearchResults"></ul>
</div>


<!--Favorites section-->
<div id="favoriteSection" style="display: none;">
    <button id="closeFavoritesBtn"><i class="fa-solid fa-xmark"></i> Close</button>
    <h3>Your favorite products</h3>
    <ul id="displayFavorites"></ul>
</div>


<!--Cart-->
<div id="cart" style="display: none;">
    <button id="closeCart"><i class="fa-solid fa-xmark"></i> Close</button>
    <h3>Your cart</h3>
    <ul id="displayCartItems"></ul>
    <button id="checkoutBtn" style="display: none;">Proceed to checkout</button>
</div>



</div>


<script src="script.js"></script>
</body>
</html>
